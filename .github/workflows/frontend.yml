name: Frontend CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main, staging]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: estatio-web
  REGISTRY: us-central1-docker.pkg.dev

jobs:
  test:
    name: Test & Type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build (test)
        run: npm run build
        env:
          VITE_API_URL: ""

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'))

    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "service_suffix=" >> $GITHUB_OUTPUT
            echo "api_url=https://estatio-api-xxxx-uc.a.run.app" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "service_suffix=-staging" >> $GITHUB_OUTPUT
            echo "api_url=https://estatio-api-staging-xxxx-uc.a.run.app" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_WORKLOAD_IDENTITY_SA }}
          audience: 'google-wif'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag
        id: tag
        run: echo "tag=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/estatio/frontend:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/estatio/frontend:${{ steps.env.outputs.environment }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_API_URL=${{ steps.env.outputs.api_url }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}${{ steps.env.outputs.service_suffix }}
          region: ${{ env.REGION }}
          image: ${{ steps.tag.outputs.tag }}
          flags: |
            --allow-unauthenticated
            --min-instances=0
            --max-instances=5
            --memory=256Mi
            --cpu=1
            --concurrency=80

      - name: Show deployed URL
        run: echo "✅ Frontend deployed to ${{ steps.deploy.outputs.url }}"
