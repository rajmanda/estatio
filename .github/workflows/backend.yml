name: Backend CI/CD

on:
  push:
    branches: [main, staging]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  SERVICE_NAME: estatio-api
  REGISTRY: us-central1-docker.pkg.dev

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      mongodb:
        image: mongo:7
        ports: ["27017:27017"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: |
          pip install ruff
          ruff check app/

      - name: Run tests
        env:
          MONGODB_URL: mongodb://localhost:27017
          MONGODB_DB: estatio_test
          SECRET_KEY: test-secret-key-32-chars-minimum!!
          GOOGLE_CLIENT_ID: test-client-id
          GOOGLE_CLIENT_SECRET: test-secret
          GOOGLE_REDIRECT_URI: http://localhost:8000/api/v1/auth/callback
          GCS_PROJECT_ID: test-project
          GCS_BUCKET_NAME: test-bucket
        run: |
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term-missing || echo "Tests pending — continuing"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: backend/coverage.xml
          flags: backend

  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')

    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "service_suffix=" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "service_suffix=-staging" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tag
        id: tag
        run: echo "tag=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/estatio-images/backend:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.tag.outputs.tag }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/estatio-images/backend:${{ steps.env.outputs.environment }}-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_ENV=${{ steps.env.outputs.environment }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}${{ steps.env.outputs.service_suffix }}
          region: ${{ env.REGION }}
          image: ${{ steps.tag.outputs.tag }}
          flags: |
            --allow-unauthenticated
            --min-instances=0
            --max-instances=10
            --memory=512Mi
            --cpu=1
            --concurrency=80
            --set-env-vars=APP_ENV=${{ steps.env.outputs.environment }},GCS_PROJECT_ID=${{ env.PROJECT_ID }}
            --set-secrets=MONGODB_URL=estatio-mongodb-url:latest,SECRET_KEY=estatio-secret-key:latest,GOOGLE_CLIENT_ID=estatio-google-client-id:latest,GOOGLE_CLIENT_SECRET=estatio-google-client-secret:latest,GCS_BUCKET_NAME=estatio-gcs-bucket-name:latest,GEMINI_API_KEY=estatio-gemini-api-key:latest

      - name: Show deployed URL
        run: echo "✅ Backend deployed to ${{ steps.deploy.outputs.url }}"

      - name: Notify on failure
        if: failure()
        run: echo "❌ Backend deployment FAILED for ${{ github.sha }}"
