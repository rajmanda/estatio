##############################################################################
# Estatio – Terraform Plan / Apply
#
# GitHub Actions secrets required (Settings → Secrets → Actions):
#   MONGODB_URL            - MongoDB Atlas connection string
#   APP_SECRET_KEY         - JWT signing key (random 32+ char string)
#   GOOGLE_CLIENT_ID       - Google OAuth 2.0 client ID
#   GOOGLE_CLIENT_SECRET   - Google OAuth 2.0 client secret
#   GEMINI_API_KEY         - Google Gemini API key
#   OPENAI_API_KEY         - OpenAI API key (optional, leave empty to skip)
#
# GitHub Actions variables required (Settings → Variables → Actions):
#   GCP_PROJECT_ID                  - e.g. mm-owners-5b8611
#   GCP_WORKLOAD_IDENTITY_PROVIDER  - projects/.../locations/.../providers/...
#   GCP_WORKLOAD_IDENTITY_SA        - cicd@PROJECT.iam.gserviceaccount.com
#   GCP_REGION                      - e.g. us-central1 (default: us-central1)
#   GITHUB_REPO_SLUG                - owner/repo  e.g. rajmanda/estatio
##############################################################################

name: Terraform

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform.yml'

env:
  TF_VERSION:  "1.7.0"
  WORKING_DIR: terraform/environments/prod

jobs:
  terraform:
    name: Terraform Plan / Apply
    runs-on: ubuntu-latest

    permissions:
      contents:      read
      id-token:      write   # required for Workload Identity Federation
      pull-requests: write   # required to post plan comments on PRs

    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Authenticate to GCP via Workload Identity ─────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account:            ${{ vars.GCP_WORKLOAD_IDENTITY_SA }}
          audience: "google-wif"

      # ── Bootstrap: ensure GCS state bucket exists ────────────────────────
      # Runs before `terraform init` so the remote backend is available.
      # Uses `gcloud storage buckets describe` to check existence first —
      # the create command is only called when the bucket is missing, making
      # this step fully idempotent (safe to re-run on every workflow run).
      - name: Bootstrap Terraform state bucket
        run: |
          BUCKET="estatio-terraform-state"
          PROJECT="${{ vars.GCP_PROJECT_ID }}"
          REGION="${{ vars.GCP_REGION || 'us-central1' }}"

          if gcloud storage buckets describe "gs://${BUCKET}" --project="${PROJECT}" > /dev/null 2>&1; then
            echo "State bucket gs://${BUCKET} already exists — skipping creation."
          else
            echo "Creating state bucket gs://${BUCKET} ..."
            gcloud storage buckets create "gs://${BUCKET}" \
              --project="${PROJECT}" \
              --location="${REGION}" \
              --uniform-bucket-level-access \
              --public-access-prevention
            # Enable versioning so we can recover from accidental state corruption.
            gcloud storage buckets update "gs://${BUCKET}" --versioning
            echo "State bucket created."
          fi

      # ── Setup Terraform ───────────────────────────────────────────────────
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # ── Format check ─────────────────────────────────────────────────────
      - name: Terraform Format Check
        run: terraform fmt -check -recursive ../../

      # ── Init ─────────────────────────────────────────────────────────────
      - name: Terraform Init
        run: terraform init

      # ── Import pre-existing resources ──────────────────────────────────
      # Resources created by setup-gcp.sh before Terraform was introduced.
      # Each import is idempotent — if already in state, it's a no-op.
      - name: Import pre-existing GCP resources
        env:
          TF_VAR_mongodb_connection_string: ${{ secrets.MONGODB_URL }}
          TF_VAR_secret_key:                ${{ secrets.APP_SECRET_KEY }}
          TF_VAR_google_client_id:          ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret:      ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TF_VAR_gemini_api_key:            ${{ secrets.GEMINI_API_KEY }}
          TF_VAR_openai_api_key:            ${{ secrets.OPENAI_API_KEY }}
        run: |
          PROJECT="${{ vars.GCP_PROJECT_ID }}"
          REGION="${{ vars.GCP_REGION || 'us-central1' }}"
          REPO="${{ vars.GITHUB_REPO_SLUG || github.repository }}"
          COMMON_VARS=(
            -var="project_id=${PROJECT}"
            -var="region=${REGION}"
            -var="documents_bucket_name=estatio-documents-${PROJECT}"
            -var="github_repo=${REPO}"
          )

          # Helper: import a resource, skip if already in state
          import_if_missing() {
            local ADDR="$1"
            local ID="$2"
            if terraform state show "$ADDR" > /dev/null 2>&1; then
              echo "✅ $ADDR already in state — skipping."
            else
              echo "📥 Importing $ADDR ..."
              terraform import "${COMMON_VARS[@]}" "$ADDR" "$ID" || echo "⚠️  Import of $ADDR failed (may not exist in GCP) — continuing."
            fi
          }

          # WIF pool + provider are read via data sources — no import needed.

          # Service accounts (created by setup-gcp.sh)
          import_if_missing "module.iam.google_service_account.cicd" \
            "projects/${PROJECT}/serviceAccounts/estatio-cicd-sa@${PROJECT}.iam.gserviceaccount.com"

          import_if_missing "module.iam.google_service_account.backend" \
            "projects/${PROJECT}/serviceAccounts/estatio-backend-sa@${PROJECT}.iam.gserviceaccount.com"

          import_if_missing "module.iam.google_service_account.frontend" \
            "projects/${PROJECT}/serviceAccounts/estatio-frontend-sa@${PROJECT}.iam.gserviceaccount.com"

          # Artifact Registry
          import_if_missing "google_artifact_registry_repository.estatio_images" \
            "projects/${PROJECT}/locations/${REGION}/repositories/estatio-images"

          # GCS document bucket
          import_if_missing "google_storage_bucket.documents" \
            "estatio-documents-${PROJECT}"

          # Cloud Run services (created by previous partial applies)
          import_if_missing "module.cloudrun.google_cloud_run_v2_service.backend" \
            "projects/${PROJECT}/locations/${REGION}/services/estatio-api"

          import_if_missing "module.cloudrun.google_cloud_run_v2_service.frontend" \
            "projects/${PROJECT}/locations/${REGION}/services/estatio-web"

          # Secret Manager secrets (created by previous partial applies)
          for SECRET in estatio-mongodb-url estatio-secret-key estatio-google-client-id estatio-google-client-secret estatio-gcs-bucket-name estatio-gemini-api-key; do
            import_if_missing "module.secrets.google_secret_manager_secret.secrets[\"${SECRET}\"]" \
              "projects/${PROJECT}/secrets/${SECRET}"
            import_if_missing "module.secrets.google_secret_manager_secret_version.versions[\"${SECRET}\"]" \
              "projects/${PROJECT}/secrets/${SECRET}/versions/latest"
          done

      # ── Validate ─────────────────────────────────────────────────────────
      - name: Terraform Validate
        run: terraform validate

      # ── Plan ─────────────────────────────────────────────────────────────
      # Sensitive vars are passed via TF_VAR_* env vars — never in shell
      # args so they don't appear in runner logs or process listings.
      # set -o pipefail ensures the step fails when terraform fails, even
      # though output is piped through tee.
      - name: Terraform Plan
        id: plan
        env:
          # Expose secrets as env vars so they don't appear in the shell
          # command history.  Terraform reads TF_VAR_<name> automatically.
          TF_VAR_mongodb_connection_string: ${{ secrets.MONGODB_URL }}
          TF_VAR_secret_key:                ${{ secrets.APP_SECRET_KEY }}
          TF_VAR_google_client_id:          ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret:      ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TF_VAR_gemini_api_key:            ${{ secrets.GEMINI_API_KEY }}
          TF_VAR_openai_api_key:            ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -o pipefail
          terraform plan -no-color -out=tfplan \
            -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="region=${{ vars.GCP_REGION || 'us-central1' }}" \
            -var="documents_bucket_name=estatio-documents-${{ vars.GCP_PROJECT_ID }}" \
            -var="github_repo=${{ vars.GITHUB_REPO_SLUG || github.repository }}" \
            2>&1 | tee plan_output.txt

      # ── Comment plan on PRs ───────────────────────────────────────────────
      - name: Comment PR with plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs')
            const plan = fs.readFileSync('${{ env.WORKING_DIR }}/plan_output.txt', 'utf8')
            const body = `## Terraform Plan\n\`\`\`hcl\n${plan.slice(0, 65000)}\n\`\`\``
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body,
            })

      # ── Apply (main branch only) ──────────────────────────────────────────
      - name: Terraform Apply
        if: |
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
          github.ref == 'refs/heads/main' &&
          steps.plan.outcome == 'success'
        env:
          TF_VAR_mongodb_connection_string: ${{ secrets.MONGODB_URL }}
          TF_VAR_secret_key:                ${{ secrets.APP_SECRET_KEY }}
          TF_VAR_google_client_id:          ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret:      ${{ secrets.GOOGLE_CLIENT_SECRET }}
          TF_VAR_gemini_api_key:            ${{ secrets.GEMINI_API_KEY }}
          TF_VAR_openai_api_key:            ${{ secrets.OPENAI_API_KEY }}
        run: terraform apply -auto-approve tfplan
